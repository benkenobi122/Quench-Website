<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUENCH</title>
    <!-- EmailJS Library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("q23wZuAx1DG8TFEzV");
       })();
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>QUENCH Hydration</h1>
        <!-- Your buttons and inputs go here -->
    </div>

    <script>
        // Use these functions in your HTML buttons: onclick="handleOrder()"
        function handleNewsletter(email) {
            emailjs.send("service_n2x6gnn", "template_5p2vnsb", {
                to_email: email,
                message: "Welcome to the club!"
            }).then(() => alert("Sent!"), (err) => console.log(err));
        }

        function handleOrder(email, total) {
            emailjs.send("service_3ize0sj", "template_grk79o4", {
                to_email: email,
                order_total: total
            }).then(() => alert("Order Receipt Sent!"), (err) => console.log(err));
        }
    </script>
</body>
</html>
